services:
  auth:
    build:
      context: .
      dockerfile: dockerfile
    volumes:
      - .:/app
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
    environment:
      HTTP_PORT: ${HTTP_PORT}
      APP_ENV: ${APP_ENV}
      JWT_SECRET: ${JWT_SECRET}
      TOKEN_EXP: ${TOKEN_EXP}
      REFRESH_TOKEN_EXP: ${REFRESH_TOKEN_EXP}
      VERIFY_TOKEN_EXP: ${VERIFY_TOKEN_EXP}
      RESET_TOKEN_EXP: ${RESET_TOKEN_EXP}
      DATABASE_URL: ${POSTGRES_SCHEMA}://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_PARAMS}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
